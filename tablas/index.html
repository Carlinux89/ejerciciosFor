<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Multiplicar</title>
    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
</head>

<body>

    <div class="container">

        <button class="btn-probar" onclick="generarTablas()">📲 Generar tabla</button>

        <!-- INSTRUCCIÓN PRINCIPAL -->
        <p class="instrucciones">
            👉 Escribe un número mayor a 0 para ver tu tabla de multiplicar
        </p>

        <div class="input-group">
            <label for="txtTabla">🔢 Número a multiplicar</label>

            <input type="text" id="txtTabla" placeholder="Ejemplo: 5">

            <!-- AYUDA -->
            <small class="ayuda">Solo números positivos (1, 2, 3...)</small>

            <!-- ERROR -->
            <small id="mensajeError" class="error"></small>
        </div>

        <h1 id="titulo">📘Tabla de Multiplicar</h1>


        <div class="tabla" id="contenedorTabla">
            <div class="fila">3 x 1 = <span>3</span></div>
            <div class="fila">3 x 2 = <span>6</span></div>
            <div class="fila">3 x 3 = <span>9</span></div>
            <div class="fila">3 x 4 = <span>12</span></div>
            <div class="fila">3 x 5 = <span>15</span></div>
            <div class="fila">3 x 6 = <span>18</span></div>
            <div class="fila">3 x 7 = <span>21</span></div>
            <div class="fila">3 x 8 = <span>24</span></div>
            <div class="fila">3 x 9 = <span>27</span></div>
            <div class="fila">3 x 10 = <span>30</span></div>
        </div>

        <footer class="footer">
            <p>Hecho con 💖 por <span>Carlos Chavez</span></p>
        </footer>

    </div>

</body>


</html>
